<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/quick-task.css')}}">
        <title>Quick Task</title>
    </head>
    <body>
        <div class="wrapper">
            <h1>Quick Task</h1>
            <h5>Zone</h5>
            <div class="btn-group" role="group" aria-label="Basic radio toggle button group">
                {% for i in range(1, 9)%}
                    <input type="radio" class="btn-check" id={{ "zone" ~ i }}  name="zones" autocomplete="off" />
                    <label class="btn btn-outline-primary" for={{ "zone" ~ i }}>{{i}}</label>
                {% endfor %}
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3" crossorigin="anonymous"></script>
        <script type="text/javascript" src="{{url_for('static', filename='script/quick-task.js')}}"></script>
    </body>
</html>
